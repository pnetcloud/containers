name: Update Metadata

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudnative-pg-timescaledb-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  autocommit:
    name: Update and autocommit resolver artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: true
      - name: Run deterministic update
        run: make update UPDATE_ARGS=--json > /tmp/cloudnative-pg-timescaledb-update.json
      - name: Validate repository gates
        run: make validate
      - name: Stage resolver-owned update paths
        run: cloudnative-pg-timescaledb/scripts/autocommit-stage.sh
      - name: Validate staged update paths
        run: cloudnative-pg-timescaledb/scripts/validate-autocommit-staging.sh
      - name: Write update summary
        run: |
          set -Eeuo pipefail
          changed_files="$(mktemp)"
          classified="$(mktemp)"
          git diff --cached --name-only > "${changed_files}"
          if [[ -s "${changed_files}" && -x cloudnative-pg-timescaledb/scripts/classify-update-origin.sh ]]; then
            cloudnative-pg-timescaledb/scripts/classify-update-origin.sh \
              --rules cloudnative-pg-timescaledb/config/change-origin-rules.json \
              --changed-files "${changed_files}" > "${classified}"
          else
            printf '{"renovate_originated":[],"resolver_originated":[],"unknown":[]}' > "${classified}"
          fi
          list_origin() {
            python3 -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); items=data.get(sys.argv[2], []); print("\n".join(f"- {item}" for item in items) if items else sys.argv[3])' "$@"
          }
          {
            printf '## Resolver-originated changes\n\n'
            list_origin "${classified}" resolver_originated 'No resolver-owned metadata or generated artifact changes.'
            printf '\n'
            printf '## Renovate-originated changes\n\n'
            list_origin "${classified}" renovate_originated 'No Renovate-originated dependency changes.'
            printf '\n## Unknown-origin changes\n\n'
            list_origin "${classified}" unknown 'No unknown-origin changes.'
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Commit update
        run: |
          set -Eeuo pipefail
          if git diff --cached --quiet; then
            printf 'No resolver-owned update changes to commit.\n'
            exit 0
          fi
          git config user.name 'pnetcloud-update-bot'
          git config user.email 'pnetcloud-update-bot@users.noreply.github.com'
          TZ=UTC git commit -m 'chore(cnpg-timescaledb): update resolver metadata'
          git push
