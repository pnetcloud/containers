name: Update Metadata

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudnative-pg-timescaledb-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  autocommit:
    name: Update and autocommit resolver artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: write
      contents: write
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: true
      - name: Set UTC release date
        id: release_date
        run: printf 'date=%s\n' "$(date -u +%Y%m%d)" >> "${GITHUB_OUTPUT}"
      - name: Run deterministic update
        env:
          DATE: ${{ steps.release_date.outputs.date }}
          GITHUB_TOKEN: ${{ github.token }}
        run: make update UPDATE_ARGS=--json > /tmp/cloudnative-pg-timescaledb-update.json
      - name: Validate repository gates
        run: make validate
      - name: Stage resolver-owned update paths
        run: cloudnative-pg-timescaledb/scripts/autocommit-stage.sh
      - name: Validate staged update paths
        run: cloudnative-pg-timescaledb/scripts/validate-autocommit-staging.sh
      - name: Write update summary
        if: always()
        env:
          SUMMARY_STATUS: ${{ job.status }}
        run: |
          set -Eeuo pipefail
          changed_files="$(mktemp)"
          git diff --cached --name-only > "${changed_files}"
          changed="$(paste -sd, "${changed_files}" || true)"
          if [[ -z "${changed}" ]]; then changed="none"; fi
          export UPSTREAM_COMPONENT="CloudNativePG/TimescaleDB metadata"
          export OLD_VERSION_DIGEST="unchanged"
          export NEW_VERSION_DIGEST="unchanged"
          if [[ -f /tmp/cloudnative-pg-timescaledb-update.json ]]; then
            eval "$(python3 - /tmp/cloudnative-pg-timescaledb-update.json <<'PY'
          import hashlib
          import json
          import shlex
          import sys
          from pathlib import Path
          payload = json.loads(Path(sys.argv[1]).read_text())
          plugin = payload.get("barman_plugin") or {}
          old = payload.get("old") or payload.get("previous") or {}
          new = payload.get("new") or payload.get("current") or {}
          if not old and plugin.get("old_reference"):
              old = {"barman_plugin": plugin["old_reference"]}
          if not new and plugin.get("new_reference"):
              new = {"barman_plugin": plugin["new_reference"]}
          def compact(value):
              if isinstance(value, dict):
                  parts = []
                  for key in sorted(value):
                      item = value[key]
                      if isinstance(item, (str, int, float, bool)):
                          parts.append(f"{key}={item}")
                  return ",".join(parts) or "unchanged"
              if isinstance(value, str):
                  stripped = value.strip()
                  if not stripped:
                      return "unchanged"
                  return "sha256:" + hashlib.sha256(stripped.encode("utf-8")).hexdigest()
              return str(value) if value else "unchanged"
          print("OLD_VERSION_DIGEST=" + shlex.quote(compact(old)))
          print("NEW_VERSION_DIGEST=" + shlex.quote(compact(new)))
          PY
            )"
          fi
          export CHANGED_FILES="${changed}"
          if [[ "${changed}" == "none" ]]; then
            NOOP_STATUS="true"
          else
            NOOP_STATUS="false"
          fi
          export NOOP_STATUS
          export CANDIDATE_DIGEST="n/a"
          export PUBLISHED_DIGEST="n/a"
          export SCAN_RESULT="n/a"
          export SBOM_STATUS="n/a"
          export PROVENANCE_STATUS="n/a"
          export SIGNATURE_STATUS="n/a"
          if [[ "${SUMMARY_STATUS}" == "success" ]]; then
            FAILURE_REASON="none"
          else
            FAILURE_REASON="update workflow failed; inspect job logs"
          fi
          export FAILURE_REASON
          export REMEDIATION_COMMAND="make update && make validate"
          cloudnative-pg-timescaledb/scripts/write-step-summary.sh \
            --template cloudnative-pg-timescaledb/templates/summaries/update.md \
            --output "${GITHUB_STEP_SUMMARY}" \
            --require-success OLD_VERSION_DIGEST \
            --require-success NEW_VERSION_DIGEST \
            --require-failure-reason
      - name: Commit update
        run: |
          set -Eeuo pipefail
          if git diff --cached --quiet; then
            printf 'No resolver-owned update changes to commit.\n'
            exit 0
          fi
          git config user.name 'pnetcloud-update-bot'
          git config user.email 'pnetcloud-update-bot@users.noreply.github.com'
          TZ=UTC git commit -m 'chore(cnpg-timescaledb): update resolver metadata'
          CI_GIT_PUSH_FETCH_REF="${GITHUB_REF_NAME}" CI_GIT_PUSH_REBASE_REF="origin/${GITHUB_REF_NAME}" cloudnative-pg-timescaledb/scripts/ci-git-push.sh
          GH_TOKEN="${{ github.token }}" cloudnative-pg-timescaledb/scripts/ci-retry.sh gh workflow run build.yml --ref "${GITHUB_REF_NAME}"

  catalog-autocommit:
    name: Generate and autocommit release catalogs
    needs: autocommit
    if: "${{ !(github.actor == 'github-actions[bot]' && github.event.head_commit.message == 'chore(cnpg-timescaledb): update release catalogs') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      # actions/checkout v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: true
      - name: Refresh branch tip after resolver autocommit
        run: |
          set -Eeuo pipefail
          cloudnative-pg-timescaledb/scripts/ci-retry.sh git fetch --no-tags --prune --depth=1 origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"
      - name: Locate release metadata
        id: catalog_metadata
        run: |
          set -Eeuo pipefail
          release_metadata_dir="cloudnative-pg-timescaledb/release-metadata"
          if [[ ! -d "${release_metadata_dir}" ]] || [[ -z "$(find "${release_metadata_dir}" -type f -name '*.json' -print -quit)" ]]; then
            printf 'No release metadata found; release catalog autocommit is a no-op.\n'
            printf 'available=false\n' >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          printf 'available=true\n' >> "${GITHUB_OUTPUT}"
          printf 'path=%s\n' "${release_metadata_dir}" >> "${GITHUB_OUTPUT}"
      - name: Generate release catalogs
        if: steps.catalog_metadata.outputs.available == 'true'
        run: |
          set -Eeuo pipefail
          make catalog CATALOG_ARGS="--release-metadata ${{ steps.catalog_metadata.outputs.path }}"
      - name: Validate release catalogs
        if: steps.catalog_metadata.outputs.available == 'true'
        run: |
          set -Eeuo pipefail
          cloudnative-pg-timescaledb/scripts/generate-catalog.sh \
            --release-metadata "${{ steps.catalog_metadata.outputs.path }}" \
            --validate-catalog cloudnative-pg-timescaledb/catalog/catalog-standard-trixie.yaml \
            --validate-catalog cloudnative-pg-timescaledb/catalog/catalog-standard-bookworm.yaml
      - name: Stage release catalog paths
        if: steps.catalog_metadata.outputs.available == 'true'
        run: |
          set -Eeuo pipefail
          AUTOCOMMIT_ALLOWLIST=cloudnative-pg-timescaledb/config/catalog-autocommit-allowlist.txt \
            cloudnative-pg-timescaledb/scripts/autocommit-stage.sh
      - name: Validate release catalog staged paths
        if: steps.catalog_metadata.outputs.available == 'true'
        run: |
          set -Eeuo pipefail
          AUTOCOMMIT_ALLOWLIST=cloudnative-pg-timescaledb/config/catalog-autocommit-allowlist.txt \
            cloudnative-pg-timescaledb/scripts/validate-autocommit-staging.sh
      - name: Capture release catalog changes
        id: catalog_changes
        if: steps.catalog_metadata.outputs.available == 'true'
        run: |
          set -Eeuo pipefail
          changed="$(git diff --cached --name-only | paste -sd, || true)"
          if [[ -z "${changed}" ]]; then changed="none"; fi
          printf 'changed_files=%s\n' "${changed}" >> "${GITHUB_OUTPUT}"
          printf 'noop=%s\n' "$([[ "${changed}" == "none" ]] && printf true || printf false)" >> "${GITHUB_OUTPUT}"
      - name: Commit release catalogs
        if: steps.catalog_metadata.outputs.available == 'true'
        run: |
          set -Eeuo pipefail
          if git diff --cached --quiet; then
            printf 'No release catalog changes to commit.\n'
            exit 0
          fi
          git config user.name 'pnetcloud-catalog-bot'
          git config user.email 'pnetcloud-catalog-bot@users.noreply.github.com'
          TZ=UTC git commit -m 'chore(cnpg-timescaledb): update release catalogs'
          CI_GIT_PUSH_FETCH_REF="${GITHUB_REF_NAME}" CI_GIT_PUSH_REBASE_REF="origin/${GITHUB_REF_NAME}" cloudnative-pg-timescaledb/scripts/ci-git-push.sh
      - name: Write catalog summary
        if: always()
        env:
          SUMMARY_STATUS: ${{ job.status }}
        run: |
          set -Eeuo pipefail
          catalog_digests="$(sha256sum cloudnative-pg-timescaledb/catalog/catalog-standard-*.yaml 2>/dev/null | awk '{print $2 "=" $1}' | paste -sd, || true)"
          if [[ -z "${catalog_digests}" ]]; then catalog_digests="none"; fi
          export CATALOG_PATHS="cloudnative-pg-timescaledb/catalog/catalog-standard-trixie.yaml,cloudnative-pg-timescaledb/catalog/catalog-standard-bookworm.yaml"
          export CATALOG_DIGESTS="${catalog_digests}"
          export CHANGED_FILES="${{ steps.catalog_changes.outputs.changed_files || 'none' }}"
          export NOOP_STATUS="${{ steps.catalog_changes.outputs.noop || 'true' }}"
          COMMIT_SHA="$(git rev-parse --short HEAD 2>/dev/null || printf n/a)"
          export COMMIT_SHA
          export CANDIDATE_DIGEST="n/a"
          if [[ "${SUMMARY_STATUS}" == "success" ]]; then
            FAILURE_REASON="none"
          else
            FAILURE_REASON="catalog autocommit failed; inspect job logs"
          fi
          export FAILURE_REASON
          export REMEDIATION_COMMAND="make catalog && make validate"
          cloudnative-pg-timescaledb/scripts/write-step-summary.sh \
            --template cloudnative-pg-timescaledb/templates/summaries/catalog.md \
            --output "${GITHUB_STEP_SUMMARY}" \
            --require-success CATALOG_PATHS \
            --require-success CATALOG_DIGESTS \
            --require-failure-reason
