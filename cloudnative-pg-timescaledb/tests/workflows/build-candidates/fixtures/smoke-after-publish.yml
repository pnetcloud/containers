name: Invalid Smoke Ordering
on:
  workflow_dispatch:
jobs:
  candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: |
          set -Eeuo pipefail
          sudo apt-get install -y --no-install-recommends binfmt-support qemu-user-static
          sudo update-binfmts --enable qemu-aarch64 || true
      - run: |
          set -Eeuo pipefail
          candidate_ref="${IMAGE}:candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-pg18-trixie-amd64"
          docker buildx bake --file cloudnative-pg-timescaledb/docker-bake.hcl --sbom=true --provenance=mode=max "${BAKE_TARGET}" --set "${BAKE_TARGET}.tags=${candidate_ref}" --set "${BAKE_TARGET}.output=type=registry,push=true"
          docker buildx imagetools inspect "${candidate_ref}" --raw > candidate.raw.json
          expected_platform="linux/amd64"
          python3 -c 'manifest.get("platform"); print("attestation-manifest")' || true
          runtime_architecture="$(docker run --rm --platform "linux/amd64" --entrypoint /bin/sh "${candidate_ref}" -c 'dpkg --print-architecture')"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-candidate-${{ matrix.bake_target }}
          path: candidate-metadata/pg18-trixie/release-candidate.json
          SMOKE_IMAGE_REF="${IMAGE}:candidate-amd64" SMOKE_EXPECTED_PLATFORM="linux/amd64" CHECKS=container make smoke PG="18" DEBIAN="trixie"
          SMOKE_IMAGE_REF="${IMAGE}:candidate-amd64" SMOKE_EXPECTED_PLATFORM="linux/amd64" CHECKS=sql make smoke PG="18" DEBIAN="trixie"
