name: Validate Job Continue On Error Gates
on:
  pull_request:
  push:
  workflow_dispatch:
permissions: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Job continue on error gates
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          make validate
          find .github/workflows -type f -name '*.yml' -print0 | sort -z | xargs -0 actionlint
          git ls-files 'cloudnative-pg-timescaledb/scripts/*.sh' 'cloudnative-pg-timescaledb/scripts/**/*.sh' | sort | xargs shellcheck
