name: Valid Escaped Dollar Before Single Quote
on:
  pull_request:
  push:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - run: |
          set -Eeuo pipefail
          printf '%s\n' \$'literal dollar quote marker'
          sudo apt-get install -y --no-install-recommends shellcheck
          make validate
          find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 | sort -z | xargs -0 actionlint
          git ls-files 'cloudnative-pg-timescaledb/scripts/*.sh' 'cloudnative-pg-timescaledb/scripts/**/*.sh' | sort | xargs shellcheck
