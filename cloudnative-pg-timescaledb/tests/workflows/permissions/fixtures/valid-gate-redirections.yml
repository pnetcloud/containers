name: Valid Gate Redirections
on:
  pull_request:
  push:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          set -Eeuo pipefail
          sudo apt-get install -y --no-install-recommends shellcheck 2>&1
          make validate &>validate.log
          find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 | sort -z | xargs -0 actionlint >actionlint.log
          git ls-files 'cloudnative-pg-timescaledb/scripts/*.sh' 'cloudnative-pg-timescaledb/scripts/**/*.sh' | sort | xargs shellcheck 2>shellcheck.err
