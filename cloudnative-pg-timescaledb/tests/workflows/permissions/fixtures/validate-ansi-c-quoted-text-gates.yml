name: Validate ANSI C Quoted Text Gates
on:
  pull_request:
  push:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          set -Eeuo pipefail
          # shellcheck disable=SC1003
          printf '%s\n' $'gate text with escaped quote \'; make validate; find .github/workflows -type f -print0 | xargs -0 actionlint; git ls-files \\'cloudnative-pg-timescaledb/scripts/*.sh\\' \\'cloudnative-pg-timescaledb/scripts/**/*.sh\\' | sort | xargs shellcheck'
