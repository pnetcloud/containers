name: Valid ANSI C Heredoc Delimiter
on:
  pull_request:
  push:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - run: |
          set -Eeuo pipefail
          # shellcheck disable=SC1009,SC1044,SC1072,SC1073
          cat <<$'EOF'
          metadata
          EOF
          sudo apt-get install -y --no-install-recommends shellcheck
          make validate
          find .github/workflows -type f \( -name '*.yml' -o -name '*.yaml' \) -print0 | sort -z | xargs -0 actionlint
          git ls-files 'cloudnative-pg-timescaledb/scripts/*.sh' 'cloudnative-pg-timescaledb/scripts/**/*.sh' | sort | xargs shellcheck
