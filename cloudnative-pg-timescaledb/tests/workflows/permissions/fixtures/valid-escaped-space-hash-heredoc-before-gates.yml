name: Valid Escaped Space Hash Heredoc Before Gates
on:
  pull_request:
  push:
  workflow_dispatch:
permissions: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Conditional escaped-space hash heredoc before gates
        run: |
          if false; then
            cat <<EOF\ #marker
          make validate
          find .github/workflows -type f -name '*.yml' -print0 | sort -z | xargs -0 actionlint
          git ls-files 'cloudnative-pg-timescaledb/scripts/*.sh' 'cloudnative-pg-timescaledb/scripts/**/*.sh' | sort | xargs shellcheck
          EOF #marker
          fi
          sudo apt-get update
          sudo apt-get install -y shellcheck
          make validate
          find .github/workflows -type f -name '*.yml' -print0 | sort -z | xargs -0 actionlint
          git ls-files 'cloudnative-pg-timescaledb/scripts/*.sh' 'cloudnative-pg-timescaledb/scripts/**/*.sh' | sort | xargs shellcheck
